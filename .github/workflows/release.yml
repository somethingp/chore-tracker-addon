name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Show versions
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/chore_tracker/manifest.json'))['version'])")
          echo "Tag version:      ${{ steps.version.outputs.VERSION }}"
          echo "Manifest version: $MANIFEST_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          generate_release_notes: true
          body: |
            ## Installation
            Install via HACS (Integrations) or copy `custom_components/chore_tracker/` to your HA config folder and restart.

            The Lovelace card is included automatically — no separate card install needed.
